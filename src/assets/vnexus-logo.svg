<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F4CFF"/>
      <stop offset="100%" stop-color="#0A1F44"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#F0D060"/>
    </linearGradient>
  </defs>
  <!-- Icon: hexagon with V -->
  <g transform="translate(20, 10)">
    <polygon points="40,0 80,23 80,69 40,92 0,69 0,23" fill="url(#brandGrad)" opacity="0.9"/>
    <polygon points="40,8 72,27 72,65 40,84 8,65 8,27" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
    <text x="40" y="58" text-anchor="middle" fill="#F8FAFC" font-family="Montserrat, sans-serif" font-weight="800" font-size="36">V</text>
  </g>
  <!-- Text -->
  <text x="130" y="50" fill="#F8FAFC" font-family="Montserrat, sans-serif" font-weight="700" font-size="28" letter-spacing="4">VNEXUS</text>
  <text x="130" y="80" fill="#D4AF37" font-family="Montserrat, sans-serif" font-weight="500" font-size="13" letter-spacing="6">TEC</text>
  <text x="132" y="98" fill="#8892A0" font-family="Montserrat, sans-serif" font-weight="400" font-size="8" letter-spacing="3">ENGENHARIA DIGITAL</text>
</svg>
